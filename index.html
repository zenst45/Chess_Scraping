<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
          --bg: #0a0a0f;
          --surface: #111118;
          --surface2: #18181f;
          --border: #2a2a35;
          --gold: #c8a96e;
          --gold2: #e8c98e;
          --white: #f0ede6;
          --muted: #6b6878;
          --green: #4a9e6b;
          --red: #c45a5a;
          --draw: #7a7a9e;
          --accent: #8b6fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
          background: var(--bg);
          color: var(--white);
          font-family: 'JetBrains Mono', monospace;
          min-height: 100vh;
          overflow-x: hidden;
        }

        /* Background chessboard pattern */
        body::before {
          content: '';
          position: fixed;
          inset: 0;
          background-image:
            repeating-conic-gradient(#ffffff03 0% 25%, transparent 0% 50%);
          background-size: 60px 60px;
          pointer-events: none;
          z-index: 0;
        }

        .container {
          position: relative;
          z-index: 1;
          max-width: 1400px;
          margin: 0 auto;
          padding: 0 24px;
        }

        /* Header */
        header {
          border-bottom: 1px solid var(--border);
          padding: 20px 0;
          position: sticky;
          top: 0;
          background: rgba(10,10,15,0.95);
          backdrop-filter: blur(12px);
          z-index: 100;
        }

        .header-inner {
          display: flex;
          align-items: center;
          justify-content: space-between;
        }

        .logo {
          display: flex;
          align-items: center;
          gap: 12px;
        }

        .logo-icon {
          width: 36px;
          height: 36px;
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 2px;
        }

        .logo-icon span {
          background: var(--gold);
          border-radius: 2px;
          transition: background 0.3s;
        }

        .logo-icon span:nth-child(2),
        .logo-icon span:nth-child(3) { background: var(--surface2); border: 1px solid var(--border); }

        .logo h1 {
          font-family: 'Playfair Display', serif;
          font-size: 1.4rem;
          font-weight: 900;
          letter-spacing: 0.04em;
          color: var(--white);
        }

        .logo h1 span { color: var(--gold); }

        nav {
          display: flex;
          gap: 4px;
        }

        nav button {
          background: none;
          border: 1px solid transparent;
          color: var(--muted);
          padding: 8px 16px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 0.75rem;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          cursor: pointer;
          border-radius: 4px;
          transition: all 0.2s;
        }

        nav button:hover { color: var(--white); border-color: var(--border); }
        nav button.active { color: var(--gold); border-color: var(--gold); background: rgba(200,169,110,0.08); }

        .header-actions {
          display: flex;
          align-items: center;
          gap: 12px;
        }

        .status-dot {
          width: 8px;
          height: 8px;
          border-radius: 50%;
          background: var(--muted);
          animation: none;
        }

        .status-dot.online {
          background: var(--green);
          box-shadow: 0 0 8px var(--green);
          animation: pulse 2s infinite;
        }

        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.4; }
        }

        .btn {
          padding: 8px 20px;
          border-radius: 4px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 0.75rem;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          cursor: pointer;
          transition: all 0.2s;
          border: none;
        }

        .btn-primary {
          background: var(--gold);
          color: var(--bg);
          font-weight: 600;
        }

        .btn-primary:hover { background: var(--gold2); }
        .btn-primary:disabled { background: var(--border); color: var(--muted); cursor: default; }

        .btn-ghost {
          background: transparent;
          color: var(--muted);
          border: 1px solid var(--border);
        }

        .btn-ghost:hover { color: var(--white); border-color: var(--muted); }

        /* Stat cards */
        .stats-bar {
          display: grid;
          grid-template-columns: repeat(4, 1fr);
          gap: 1px;
          background: var(--border);
          border: 1px solid var(--border);
          border-radius: 8px;
          overflow: hidden;
          margin: 28px 0;
        }

        .stat-card {
          background: var(--surface);
          padding: 20px 24px;
          position: relative;
          overflow: hidden;
        }

        .stat-card::after {
          content: '';
          position: absolute;
          bottom: 0; left: 0; right: 0;
          height: 2px;
          background: linear-gradient(90deg, var(--gold), transparent);
          opacity: 0;
          transition: opacity 0.3s;
        }

        .stat-card:hover::after { opacity: 1; }

        .stat-label {
          font-size: 0.65rem;
          text-transform: uppercase;
          letter-spacing: 0.12em;
          color: var(--muted);
          margin-bottom: 8px;
        }

        .stat-value {
          font-family: 'Playfair Display', serif;
          font-size: 2rem;
          font-weight: 700;
          color: var(--gold);
          line-height: 1;
        }

        .stat-sub {
          font-size: 0.65rem;
          color: var(--muted);
          margin-top: 4px;
        }

        /* Sections */
        .section { display: none; padding: 0 0 48px; }
        .section.active { display: block; }

        .section-header {
          display: flex;
          align-items: center;
          justify-content: space-between;
          margin-bottom: 20px;
          padding-bottom: 16px;
          border-bottom: 1px solid var(--border);
        }

        .section-title {
          font-family: 'Playfair Display', serif;
          font-size: 1.5rem;
          font-weight: 700;
          color: var(--white);
        }

        /* Search & filters */
        .toolbar {
          display: flex;
          gap: 12px;
          margin-bottom: 20px;
          flex-wrap: wrap;
        }

        .search-box {
          flex: 1;
          min-width: 200px;
          position: relative;
        }

        .search-box input {
          width: 100%;
          background: var(--surface);
          border: 1px solid var(--border);
          color: var(--white);
          padding: 10px 16px 10px 40px;
          border-radius: 4px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 0.8rem;
          transition: border-color 0.2s;
          outline: none;
        }

        .search-box input:focus { border-color: var(--gold); }
        .search-box input::placeholder { color: var(--muted); }

        .search-box::before {
          content: '⌕';
          position: absolute;
          left: 12px;
          top: 50%;
          transform: translateY(-50%);
          color: var(--muted);
          font-size: 1.1rem;
        }

        select {
          background: var(--surface);
          border: 1px solid var(--border);
          color: var(--white);
          padding: 10px 16px;
          border-radius: 4px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 0.75rem;
          outline: none;
          cursor: pointer;
          transition: border-color 0.2s;
        }

        select:focus { border-color: var(--gold); }

        /* Table */
        .data-table {
          width: 100%;
          border-collapse: collapse;
          font-size: 0.8rem;
        }

        .data-table th {
          text-align: left;
          padding: 10px 16px;
          font-size: 0.65rem;
          text-transform: uppercase;
          letter-spacing: 0.1em;
          color: var(--muted);
          border-bottom: 1px solid var(--border);
          background: var(--surface);
          cursor: pointer;
          user-select: none;
          white-space: nowrap;
        }

        .data-table th:hover { color: var(--gold); }

        .data-table td {
          padding: 12px 16px;
          border-bottom: 1px solid rgba(42,42,53,0.5);
          vertical-align: middle;
          white-space: nowrap;
        }

        .data-table tr:hover td { background: var(--surface); }

        .data-table tr { transition: background 0.15s; cursor: pointer; }

        /* Player avatar */
        .player-cell {
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .avatar {
          width: 32px;
          height: 32px;
          border-radius: 50%;
          background: var(--surface2);
          border: 1px solid var(--border);
          display: flex;
          align-items: center;
          justify-content: center;
          font-size: 0.75rem;
          color: var(--gold);
          flex-shrink: 0;
          overflow: hidden;
        }

        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        .player-name {
          font-weight: 600;
          color: var(--white);
        }

        .player-title {
          display: inline-block;
          background: rgba(200,169,110,0.15);
          color: var(--gold);
          padding: 1px 6px;
          border-radius: 2px;
          font-size: 0.65rem;
          letter-spacing: 0.06em;
          margin-left: 6px;
        }

        /* Result badge */
        .result-win { color: var(--green); }
        .result-loss { color: var(--red); }
        .result-draw { color: var(--draw); }

        .badge {
          display: inline-flex;
          align-items: center;
          padding: 2px 8px;
          border-radius: 3px;
          font-size: 0.65rem;
          letter-spacing: 0.06em;
          font-weight: 600;
          text-transform: uppercase;
        }

        .badge-win { background: rgba(74,158,107,0.15); color: var(--green); }
        .badge-loss { background: rgba(196,90,90,0.15); color: var(--red); }
        .badge-draw { background: rgba(122,122,158,0.15); color: var(--draw); }
        .badge-rated { background: rgba(139,111,255,0.15); color: var(--accent); }
        .badge-casual { background: rgba(107,104,120,0.15); color: var(--muted); }

        /* Pagination */
        .pagination {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 16px 0;
          font-size: 0.75rem;
          color: var(--muted);
        }

        .page-controls {
          display: flex;
          gap: 4px;
        }

        .page-btn {
          background: var(--surface);
          border: 1px solid var(--border);
          color: var(--muted);
          width: 32px;
          height: 32px;
          border-radius: 3px;
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          font-size: 0.75rem;
          transition: all 0.2s;
          font-family: 'JetBrains Mono', monospace;
        }

        .page-btn:hover, .page-btn.active { color: var(--gold); border-color: var(--gold); }
        .page-btn:disabled { opacity: 0.3; cursor: default; }

        /* Player detail modal */
        .modal-overlay {
          position: fixed;
          inset: 0;
          background: rgba(0,0,0,0.8);
          backdrop-filter: blur(4px);
          z-index: 200;
          display: none;
          align-items: center;
          justify-content: center;
          padding: 24px;
        }

        .modal-overlay.open { display: flex; }

        .modal {
          background: var(--surface);
          border: 1px solid var(--border);
          border-radius: 8px;
          width: 100%;
          max-width: 800px;
          max-height: 85vh;
          overflow: hidden;
          display: flex;
          flex-direction: column;
          animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
          from { opacity: 0; transform: scale(0.96) translateY(8px); }
          to { opacity: 1; transform: none; }
        }

        .modal-header {
          padding: 20px 24px;
          border-bottom: 1px solid var(--border);
          display: flex;
          align-items: center;
          justify-content: space-between;
        }

        .modal-body {
          overflow-y: auto;
          padding: 24px;
          flex: 1;
        }

        .modal-close {
          background: none;
          border: none;
          color: var(--muted);
          cursor: pointer;
          font-size: 1.2rem;
          padding: 4px;
          transition: color 0.2s;
        }

        .modal-close:hover { color: var(--white); }

        /* Player modal stats */
        .player-stats-grid {
          display: grid;
          grid-template-columns: repeat(3, 1fr);
          gap: 12px;
          margin-bottom: 24px;
        }

        .mini-stat {
          background: var(--surface2);
          border: 1px solid var(--border);
          padding: 14px;
          border-radius: 4px;
          text-align: center;
        }

        .mini-stat-value {
          font-family: 'Playfair Display', serif;
          font-size: 1.4rem;
          font-weight: 700;
          color: var(--gold);
        }

        .mini-stat-label {
          font-size: 0.65rem;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: 0.1em;
          margin-top: 4px;
        }

        /* Win rate bar */
        .result-bar {
          display: flex;
          height: 6px;
          border-radius: 3px;
          overflow: hidden;
          margin: 12px 0 4px;
        }

        .result-bar-win { background: var(--green); }
        .result-bar-draw { background: var(--draw); }
        .result-bar-loss { background: var(--red); }

        .result-bar-labels {
          display: flex;
          justify-content: space-between;
          font-size: 0.65rem;
          color: var(--muted);
        }

        /* Loading / empty state */
        .loading {
          text-align: center;
          padding: 60px;
          color: var(--muted);
          font-size: 0.8rem;
        }

        .loading::before {
          content: '♟';
          display: block;
          font-size: 2rem;
          margin-bottom: 12px;
          animation: rotate 1.5s linear infinite;
          color: var(--gold);
        }

        @keyframes rotate {
          from { transform: rotate(0); }
          to { transform: rotate(360deg); }
        }

        .empty-state {
          text-align: center;
          padding: 60px;
          color: var(--muted);
        }

        .empty-state .icon {
          font-size: 3rem;
          margin-bottom: 12px;
          opacity: 0.3;
        }

        /* API url banner */
        .api-banner {
          background: rgba(200,169,110,0.08);
          border: 1px solid rgba(200,169,110,0.2);
          border-radius: 6px;
          padding: 12px 16px;
          margin-bottom: 20px;
          font-size: 0.75rem;
          display: flex;
          align-items: center;
          gap: 10px;
        }

        .api-banner span { color: var(--muted); }
        .api-banner input {
          background: var(--surface2);
          border: 1px solid var(--border);
          color: var(--gold);
          padding: 4px 10px;
          border-radius: 3px;
          font-family: 'JetBrains Mono', monospace;
          font-size: 0.75rem;
          width: 220px;
          outline: none;
        }

        /* PGN viewer */
        .pgn-box {
          background: var(--bg);
          border: 1px solid var(--border);
          border-radius: 4px;
          padding: 12px;
          font-size: 0.75rem;
          color: var(--muted);
          line-height: 1.8;
          max-height: 200px;
          overflow-y: auto;
          word-break: break-all;
        }

        .pgn-box .move {
          color: var(--white);
          cursor: pointer;
          padding: 0 2px;
          border-radius: 2px;
          transition: background 0.15s;
        }

        .pgn-box .move:hover { background: rgba(200,169,110,0.2); color: var(--gold); }

        .tabs {
          display: flex;
          gap: 0;
          border-bottom: 1px solid var(--border);
          margin-bottom: 16px;
        }

        .tab {
          padding: 8px 16px;
          font-size: 0.7rem;
          text-transform: uppercase;
          letter-spacing: 0.08em;
          color: var(--muted);
          cursor: pointer;
          border-bottom: 2px solid transparent;
          margin-bottom: -1px;
          transition: all 0.2s;
          background: none;
          border-left: none;
          border-right: none;
          border-top: none;
          font-family: 'JetBrains Mono', monospace;
        }

        .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
        .tab:hover:not(.active) { color: var(--white); }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Toast */
        .toast {
          position: fixed;
          bottom: 24px;
          right: 24px;
          background: var(--surface);
          border: 1px solid var(--border);
          padding: 12px 20px;
          border-radius: 4px;
          font-size: 0.75rem;
          color: var(--white);
          z-index: 300;
          transform: translateY(80px);
          transition: transform 0.3s;
        }

        .toast.show { transform: none; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">
                    <span></span><span></span><span></span><span></span>
                </div>
                <h1>Chess <span>Archive</span></h1>
            </div>
            <nav>
                <button class="active" onclick="showSection('overview')">Vue d'ensemble</button>
                <button onclick="showSection('players')">Joueurs</button>
                <button onclick="showSection('games')">Parties</button>
                <button onclick="showSection('logs')">Logs</button>
            </nav>
            <div class="header-actions">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText" style="font-size:0.7rem;color:var(--muted)">Connexion...</span>
                <button class="btn btn-primary" id="updateBtn" onclick="triggerUpdate()">Mettre à jour</button>
            </div>
        </div>
    </div>
</header>

<div class="container">

    <div class="api-banner">
        <span>Serveur API :</span>
        <input type="text" id="apiBaseUrl" value="" placeholder="(même serveur)" oninput="onApiUrlChange()">
        <span id="apiStatus" style="color:var(--muted)">—</span>
    </div>

    <!-- OVERVIEW -->
    <div class="section active" id="section-overview">
        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <div class="stat-label">Joueurs indexés</div>
                <div class="stat-value" id="statPlayers">—</div>
                <div class="stat-sub">dans /players/</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Parties totales</div>
                <div class="stat-value" id="statGames">—</div>
                <div class="stat-sub">metadata.json</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Source</div>
                <div class="stat-value" style="font-size:1.1rem;margin-top:4px">Chess.com</div>
                <div class="stat-sub">Leaderboard + GMs</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Statut serveur</div>
                <div class="stat-value" id="statStatus" style="font-size:1.1rem;margin-top:4px">—</div>
                <div class="stat-sub" id="statStatusSub">port 12346</div>
            </div>
        </div>

        <div class="section-header">
            <div class="section-title">Aperçu rapide</div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">
            <div>
                <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:12px">Derniers joueurs (local)</div>
                <div id="recentPlayers" class="loading"></div>
            </div>
            <div>
                <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:12px">Dernières parties (local)</div>
                <div id="recentGames" class="loading"></div>
            </div>
        </div>
    </div>

    <!-- PLAYERS -->
    <div class="section" id="section-players">
        <div class="section-header">
            <div class="section-title">Joueurs</div>
            <span id="playersCount" style="font-size:0.75rem;color:var(--muted)"></span>
        </div>
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="playerSearch" placeholder="Rechercher un joueur..." oninput="filterPlayers()">
            </div>
            <select id="playerTitle" onchange="filterPlayers()">
                <option value="">Tous les titres</option>
                <option value="GM">GM</option>
                <option value="IM">IM</option>
                <option value="FM">FM</option>
                <option value="WGM">WGM</option>
                <option value="NM">NM</option>
            </select>
            <select id="playerSort" onchange="sortPlayers()">
                <option value="username">Nom</option>
                <option value="games_desc">+ de parties</option>
                <option value="games_asc">- de parties</option>
            </select>
        </div>
        <div id="playersTableWrap">
            <div class="loading"></div>
        </div>
        <div class="pagination" id="playersPagination"></div>
    </div>

    <!-- GAMES -->
    <div class="section" id="section-games">
        <div class="section-header">
            <div class="section-title">Parties</div>
            <span id="gamesCount" style="font-size:0.75rem;color:var(--muted)"></span>
        </div>
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="gameSearch" placeholder="Rechercher (joueur, ouverture...)" oninput="filterGames()">
            </div>
            <select id="gameResult" onchange="filterGames()">
                <option value="">Tous résultats</option>
                <option value="win">Victoire blanche</option>
                <option value="loss">Victoire noire</option>
                <option value="draw">Nulle</option>
            </select>
            <select id="gameTimeClass" onchange="filterGames()">
                <option value="">Tous types</option>
                <option value="bullet">Bullet</option>
                <option value="blitz">Blitz</option>
                <option value="rapid">Rapid</option>
                <option value="classical">Classical</option>
                <option value="daily">Daily</option>
            </select>
            <select id="gameRated" onchange="filterGames()">
                <option value="">Classé/Non classé</option>
                <option value="true">Classé</option>
                <option value="false">Non classé</option>
            </select>
        </div>
        <div id="gamesTableWrap">
            <div class="loading"></div>
        </div>
        <div class="pagination" id="gamesPagination"></div>
    </div>

    <!-- LOGS -->
    <div class="section" id="section-logs">
        <div class="section-header">
            <div class="section-title">Logs serveur</div>
            <div style="display:flex;gap:8px">
                <button class="btn btn-ghost" onclick="fetchLogs()">Rafraîchir</button>
            </div>
        </div>
        <div id="logsContent" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;font-size:0.72rem;line-height:1.8;max-height:600px;overflow-y:auto;color:var(--muted)">
            <div class="loading"></div>
        </div>
    </div>

</div>

<!-- PLAYER DETAIL MODAL -->
<div class="modal-overlay" id="playerModal" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-header">
            <div style="display:flex;align-items:center;gap:14px">
                <div class="avatar" id="modalAvatar" style="width:48px;height:48px;font-size:1rem"></div>
                <div>
                    <div style="font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700" id="modalName">—</div>
                    <div style="font-size:0.7rem;color:var(--muted)" id="modalMeta">—</div>
                </div>
            </div>
            <button class="modal-close" onclick="document.getElementById('playerModal').classList.remove('open')">✕</button>
        </div>
        <div class="modal-body">
            <div class="player-stats-grid" id="modalStats"></div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('games-tab')">Parties</button>
                <button class="tab" onclick="switchTab('info-tab')">Profil</button>
            </div>
            <div class="tab-content active" id="games-tab">
                <div id="modalGames"><div class="loading"></div></div>
            </div>
            <div class="tab-content" id="info-tab">
                <div id="modalInfo" style="font-size:0.8rem;line-height:1.8;color:var(--muted)"></div>
            </div>
        </div>
    </div>
</div>

<!-- GAME DETAIL MODAL -->
<div class="modal-overlay" id="gameModal" onclick="closeModal(event)">
    <div class="modal">
        <div class="modal-header">
            <div>
                <div style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700" id="gameModalTitle">—</div>
                <div style="font-size:0.7rem;color:var(--muted)" id="gameModalMeta">—</div>
            </div>
            <button class="modal-close" onclick="document.getElementById('gameModal').classList.remove('open')">✕</button>
        </div>
        <div class="modal-body" id="gameModalBody"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ===== State =====
    let API_BASE = '';  // Vide = requêtes relatives au même serveur
    let allPlayers = [];
    let allGames = [];
    let filteredPlayers = [];
    let filteredGames = [];
    const PAGE_SIZE = 50;
    let playerPage = 0;
    let gamePage = 0;
    let dataLoaded = false;

    // ===== Init =====
    document.addEventListener('DOMContentLoaded', () => {
      const saved = localStorage.getItem('chess_api_url');
      if (saved && saved !== 'http://localhost:12346') {
        document.getElementById('apiBaseUrl').value = saved;
        API_BASE = saved;
      }
      checkServer();
      fetchStats();
    });

    function onApiUrlChange() {
      API_BASE = document.getElementById('apiBaseUrl').value.trim().replace(/\/$/, '');
      localStorage.setItem('chess_api_url', API_BASE);
      checkServer();
      fetchStats();
    }

    // ===== Navigation =====
    function showSection(name) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById('section-' + name).classList.add('active');
      event.currentTarget.classList.add('active');

      if (name === 'players' && allPlayers.length === 0) loadLocalData();
      if (name === 'games' && allGames.length === 0) loadLocalData();
      if (name === 'logs') fetchLogs();
    }

    // ===== API calls =====
    async function checkServer() {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      try {
        const r = await fetch(API_BASE + '/api/get/', { signal: AbortSignal.timeout(3000) });
        if (r.ok) {
          dot.className = 'status-dot online';
          txt.textContent = 'En ligne';
          document.getElementById('apiStatus').textContent = '✓ connecté';
          document.getElementById('apiStatus').style.color = 'var(--green)';
          return true;
        }
      } catch {}
      dot.className = 'status-dot';
      txt.textContent = 'Hors ligne';
      document.getElementById('apiStatus').textContent = '✗ inaccessible';
      document.getElementById('apiStatus').style.color = 'var(--red)';
      return false;
    }

    async function fetchStats() {
      try {
        const r = await fetch(API_BASE + '/api/get/', { signal: AbortSignal.timeout(3000) });
        if (!r.ok) throw new Error();
        const data = await r.json();

        const playersMatch = data.players.match(/\d+/);
        const gamesMatch = data.games.match(/\d+/);

        if (playersMatch) document.getElementById('statPlayers').textContent = parseInt(playersMatch[0]).toLocaleString('fr');
        if (gamesMatch) document.getElementById('statGames').textContent = parseInt(gamesMatch[0]).toLocaleString('fr');
        document.getElementById('statStatus').textContent = 'Actif';
        document.getElementById('statStatus').style.color = 'var(--green)';

        // Load local data for overview
        loadLocalData();

      } catch(e) {
        document.getElementById('statStatus').textContent = 'Inactif';
        document.getElementById('statStatus').style.color = 'var(--red)';
        document.getElementById('recentPlayers').innerHTML = '<div class="empty-state"><div class="icon">♟</div>Serveur inaccessible</div>';
        document.getElementById('recentGames').innerHTML = '<div class="empty-state"><div class="icon">♟</div>Serveur inaccessible</div>';
      }
    }

    async function triggerUpdate() {
      const btn = document.getElementById('updateBtn');
      btn.disabled = true;
      btn.textContent = 'Mise à jour...';
      try {
        const r = await fetch(API_BASE + '/api/update/');
        if (r.status === 202) showToast('Mise à jour lancée en arrière-plan');
        else showToast('Erreur lors du lancement');
      } catch {
        showToast('Serveur inaccessible');
      }
      setTimeout(() => { btn.disabled = false; btn.textContent = 'Mettre à jour'; }, 3000);
    }

    async function fetchLogs() {
      const el = document.getElementById('logsContent');
      el.innerHTML = '<div class="loading"></div>';
      try {
        const r = await fetch(API_BASE + '/api/logs/last/', { signal: AbortSignal.timeout(5000) });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const text = await r.text();
        el.innerHTML = '';
        const lines = text.split('\n');
        lines.forEach(line => {
          if (!line.trim()) return;
          const div = document.createElement('div');
          div.style.cssText = 'padding:1px 0;border-bottom:1px solid rgba(42,42,53,0.3)';
          if (line.includes('ERROR')) div.style.color = 'var(--red)';
          else if (line.includes('INFO')) div.style.color = 'var(--white)';
          else if (line.includes('WARNING')) div.style.color = 'var(--gold)';
          div.textContent = line;
          el.appendChild(div);
        });
        el.scrollTop = el.scrollHeight;
      } catch(e) {
        el.innerHTML = `<div style="color:var(--red)">Impossible de récupérer les logs : ${e.message}</div>`;
      }
    }

    // ===== Local data loading (via API proxy) =====
    // Since we can't directly read files from the browser, we use the API.
    // We'll read player JSON files by trying known endpoints and fallback to mock data demo.

    async function loadLocalData() {
      if (dataLoaded) { renderOverview(); renderPlayers(); renderGames(); return; }

      // Try to get the actual player list from the server
      try {
        const r = await fetch(API_BASE + '/api/players/', { signal: AbortSignal.timeout(4000) });
        if (r.ok) {
          const data = await r.json();
          allPlayers = data.players || [];
          allGames = data.games || [];
          dataLoaded = true;
          filteredPlayers = [...allPlayers];
          filteredGames = [...allGames];
          renderOverview();
          renderPlayers();
          renderGames();
          return;
        }
      } catch {}

      // Fallback: generate demo data from stats
      await loadDemoData();
    }

    async function loadDemoData() {
      // Try fetching top_players.json if server serves static files
      try {
        const r = await fetch(API_BASE + '/top_players.json', { signal: AbortSignal.timeout(3000) });
        if (r.ok) {
          const data = await r.json();
          allPlayers = (data.players || []).map(p => ({
            username: p.username,
            title: p.title || '',
            avatar: p.avatar || '',
            '@id': p['@id'] || '',
            player_id: p.player_id,
            games_count: 0
          }));
          filteredPlayers = [...allPlayers];
          dataLoaded = true;
          renderOverview();
          renderPlayers();
          document.getElementById('recentGames').innerHTML = '<div class="empty-state"><div class="icon">♔</div>Données de parties non disponibles via cette interface.<br><small>Ajoutez un endpoint <code>/api/players/</code> au serveur.</small></div>';
          return;
        }
      } catch {}

      // Full fallback: show instructions
      const msg = `<div class="empty-state" style="text-align:left;padding:24px">
        <div style="font-size:0.8rem;line-height:1.8;color:var(--muted)">
          <div style="color:var(--gold);margin-bottom:8px;font-size:0.9rem">♟ Pour afficher vos données, ajoutez ces endpoints à <code>server.py</code> :</div>
          <pre style="background:var(--bg);border:1px solid var(--border);padding:12px;border-radius:4px;font-size:0.7rem;overflow-x:auto">@app.route('/api/players/')
    def list_players():
        import os, json
        players = []
        for f in os.listdir('players/'):
            if f.endswith('.json'):
                with open(f'players/{f}') as fp:
                    d = json.load(fp)
                    p = d.get('player_info', {})
                    p['games_count'] = len(d.get('games', []))
                    p['games'] = d.get('games', [])[:50]  # last 50
                    players.append(p)
        return {'players': players, 'games': [g for p in players for g in p.pop('games', [])]}
    </pre>
        </div>
      </div>`;
      document.getElementById('recentPlayers').innerHTML = msg;
      document.getElementById('recentGames').innerHTML = msg;
      document.getElementById('playersTableWrap').innerHTML = msg;
      document.getElementById('gamesTableWrap').innerHTML = msg;
    }

    // ===== Rendering =====
    function renderOverview() {
      // Recent players
      const rp = document.getElementById('recentPlayers');
      if (allPlayers.length === 0) { rp.innerHTML = '<div class="empty-state"><div class="icon">♞</div>Aucun joueur trouvé</div>'; return; }

      const html = allPlayers.slice(0, 8).map(p => `
        <div onclick="openPlayer('${p.username}')" style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s;border-radius:3px" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">
          <div class="avatar">${p.avatar ? `<img src="${p.avatar}" onerror="this.parentNode.textContent='${p.username[0].toUpperCase()}'">` : p.username[0].toUpperCase()}</div>
          <div style="flex:1">
            <div style="font-size:0.8rem;font-weight:600">${p.username}${p.title ? `<span class="player-title">${p.title}</span>` : ''}</div>
            <div style="font-size:0.65rem;color:var(--muted)">${p.games_count ? p.games_count.toLocaleString('fr') + ' parties' : ''}</div>
          </div>
        </div>`).join('');
      rp.innerHTML = html;
    }

    function renderPlayers() {
      const wrap = document.getElementById('playersTableWrap');
      document.getElementById('playersCount').textContent = filteredPlayers.length + ' joueur(s)';

      if (filteredPlayers.length === 0) {
        wrap.innerHTML = '<div class="empty-state"><div class="icon">♞</div>Aucun joueur trouvé</div>';
        document.getElementById('playersPagination').innerHTML = '';
        return;
      }

      const start = playerPage * PAGE_SIZE;
      const page = filteredPlayers.slice(start, start + PAGE_SIZE);

      wrap.innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>#</th>
              <th onclick="sortBy('players','username')">Joueur ↕</th>
              <th onclick="sortBy('players','title')">Titre ↕</th>
              <th onclick="sortBy('players','games_count')">Parties ↕</th>
              <th>Lien Chess.com</th>
            </tr>
          </thead>
          <tbody>
            ${page.map((p, i) => `
              <tr onclick="openPlayer('${p.username}')">
                <td style="color:var(--muted)">${start + i + 1}</td>
                <td>
                  <div class="player-cell">
                    <div class="avatar">${p.avatar ? `<img src="${p.avatar}" onerror="this.parentNode.textContent='${p.username[0].toUpperCase()}'">` : p.username[0].toUpperCase()}</div>
                    <span class="player-name">${p.username}</span>
                    ${p.title ? `<span class="player-title">${p.title}</span>` : ''}
                  </div>
                </td>
                <td>${p.title ? `<span class="badge badge-rated">${p.title}</span>` : '<span style="color:var(--muted)">—</span>'}</td>
                <td style="color:var(--gold)">${p.games_count ? p.games_count.toLocaleString('fr') : '—'}</td>
                <td><a href="https://chess.com/member/${p.username}" target="_blank" onclick="event.stopPropagation()" style="color:var(--accent);text-decoration:none;font-size:0.75rem">chess.com ↗</a></td>
              </tr>`).join('')}
          </tbody>
        </table>`;

      renderPagination('players', filteredPlayers.length);
    }

    function renderGames() {
      const wrap = document.getElementById('gamesTableWrap');
      document.getElementById('gamesCount').textContent = filteredGames.length + ' partie(s)';

      if (filteredGames.length === 0) {
        wrap.innerHTML = '<div class="empty-state"><div class="icon">♔</div>Aucune partie trouvée</div>';
        document.getElementById('gamesPagination').innerHTML = '';
        return;
      }

      const start = gamePage * PAGE_SIZE;
      const page = filteredGames.slice(start, start + PAGE_SIZE);

      wrap.innerHTML = `
        <table class="data-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Blancs</th>
              <th>Noirs</th>
              <th>Résultat</th>
              <th>Type</th>
              <th>Durée</th>
              <th>Statut</th>
            </tr>
          </thead>
          <tbody>
            ${page.map(g => {
              const date = g.end_time ? new Date(g.end_time * 1000).toLocaleDateString('fr') : '—';
              const white = g.white?.username || '?';
              const black = g.black?.username || '?';
              const wr = g.white?.result;
              const result = wr === 'win' ? '<span class="badge badge-win">1-0</span>' :
                             wr === 'checkmated' || wr === 'resigned' || wr === 'timeout' || wr === 'abandoned' ?
                             '<span class="badge badge-loss">0-1</span>' :
                             '<span class="badge badge-draw">½-½</span>';
              const tc = g.time_class || '—';
              const ctrl = g.time_control ? formatTimeControl(g.time_control) : '—';
              const rated = g.rated ? '<span class="badge badge-rated">Classé</span>' : '<span class="badge badge-casual">Amical</span>';
              return `<tr onclick="openGame('${g.url}')">
                <td style="color:var(--muted)">${date}</td>
                <td><span style="cursor:pointer;color:var(--white)" onclick="event.stopPropagation();openPlayer('${white}')">${white}</span></td>
                <td><span style="cursor:pointer;color:var(--white)" onclick="event.stopPropagation();openPlayer('${black}')">${black}</span></td>
                <td>${result}</td>
                <td style="text-transform:capitalize;color:var(--muted)">${tc}</td>
                <td style="color:var(--muted)">${ctrl}</td>
                <td>${rated}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;

      renderPagination('games', filteredGames.length);

      // Overview recent games
      const rg = document.getElementById('recentGames');
      if (rg && rg.querySelector('.loading')) {
        const recent = allGames.slice(0, 8);
        if (recent.length === 0) { rg.innerHTML = '<div class="empty-state"><div class="icon">♔</div>Aucune partie</div>'; return; }
        rg.innerHTML = recent.map(g => {
          const date = g.end_time ? new Date(g.end_time * 1000).toLocaleDateString('fr') : '';
          const w = g.white?.username || '?', b = g.black?.username || '?';
          const wr = g.white?.result;
          const badge = wr === 'win' ? '<span class="badge badge-win">1-0</span>' :
                        (wr === 'checkmated'||wr==='resigned'||wr==='timeout') ? '<span class="badge badge-loss">0-1</span>' :
                        '<span class="badge badge-draw">½</span>';
          return `<div onclick="openGame('${g.url}')" style="display:flex;align-items:center;gap:8px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;border-radius:3px" onmouseover="this.style.background='var(--surface)'" onmouseout="this.style.background=''">
            ${badge}
            <div style="flex:1;font-size:0.75rem"><span style="color:var(--white)">${w}</span> <span style="color:var(--muted)">vs</span> <span style="color:var(--white)">${b}</span></div>
            <div style="font-size:0.65rem;color:var(--muted)">${date}</div>
          </div>`;
        }).join('');
      }
    }

    function renderPagination(type, total) {
      const el = document.getElementById(type + 'Pagination');
      const currentPage = type === 'players' ? playerPage : gamePage;
      const totalPages = Math.ceil(total / PAGE_SIZE);

      if (totalPages <= 1) { el.innerHTML = ''; return; }

      const startItem = currentPage * PAGE_SIZE + 1;
      const endItem = Math.min((currentPage + 1) * PAGE_SIZE, total);

      let pages = '';
      for (let i = 0; i < Math.min(totalPages, 7); i++) {
        const p = totalPages > 7 ? (i < 3 ? i : (i === 3 ? '...' : totalPages - (6 - i))) : i;
        if (p === '...') {
          pages += `<div class="page-btn" style="cursor:default">…</div>`;
        } else {
          pages += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage('${type}',${p})">${p+1}</button>`;
        }
      }

      el.innerHTML = `
        <span>${startItem}–${endItem} sur ${total.toLocaleString('fr')}</span>
        <div class="page-controls">
          <button class="page-btn" onclick="goPage('${type}',${currentPage-1})" ${currentPage===0?'disabled':''}>‹</button>
          ${pages}
          <button class="page-btn" onclick="goPage('${type}',${currentPage+1})" ${currentPage>=totalPages-1?'disabled':''}>›</button>
        </div>`;
    }

    function goPage(type, page) {
      if (type === 'players') { playerPage = page; renderPlayers(); }
      else { gamePage = page; renderGames(); }
      window.scrollTo(0, 200);
    }

    // ===== Filters =====
    function filterPlayers() {
      const q = document.getElementById('playerSearch').value.toLowerCase();
      const title = document.getElementById('playerTitle').value;
      filteredPlayers = allPlayers.filter(p =>
        (!q || p.username.toLowerCase().includes(q)) &&
        (!title || p.title === title)
      );
      playerPage = 0;
      renderPlayers();
    }

    function filterGames() {
      const q = document.getElementById('gameSearch').value.toLowerCase();
      const result = document.getElementById('gameResult').value;
      const tc = document.getElementById('gameTimeClass').value;
      const rated = document.getElementById('gameRated').value;

      filteredGames = allGames.filter(g => {
        const matchQ = !q || (g.white?.username||'').toLowerCase().includes(q) || (g.black?.username||'').toLowerCase().includes(q);
        const wr = g.white?.result;
        let matchResult = true;
        if (result === 'win') matchResult = wr === 'win';
        else if (result === 'loss') matchResult = wr !== 'win' && wr !== 'agreed' && wr !== 'stalemate' && wr !== 'repetition' && wr !== 'timevsinsufficient' && wr !== '50move';
        else if (result === 'draw') matchResult = ['agreed','stalemate','repetition','timevsinsufficient','50move'].includes(wr);
        const matchTc = !tc || g.time_class === tc;
        const matchRated = rated === '' || String(g.rated) === rated;
        return matchQ && matchResult && matchTc && matchRated;
      });
      gamePage = 0;
      renderGames();
    }

    function sortPlayers() {
      const s = document.getElementById('playerSort').value;
      if (s === 'username') filteredPlayers.sort((a,b) => a.username.localeCompare(b.username));
      else if (s === 'games_desc') filteredPlayers.sort((a,b) => (b.games_count||0)-(a.games_count||0));
      else filteredPlayers.sort((a,b) => (a.games_count||0)-(b.games_count||0));
      playerPage = 0;
      renderPlayers();
    }

    function sortBy(type, field) {
      if (type === 'players') {
        filteredPlayers.sort((a,b) => typeof a[field]==='string' ? a[field].localeCompare(b[field]) : (b[field]||0)-(a[field]||0));
        playerPage = 0; renderPlayers();
      } else {
        filteredGames.sort((a,b) => (b[field]||0)-(a[field]||0));
        gamePage = 0; renderGames();
      }
    }

    // ===== Modals =====
    function openPlayer(username) {
      const p = allPlayers.find(pl => pl.username === username);
      if (!p) { showToast('Joueur non trouvé localement'); return; }

      document.getElementById('playerModal').classList.add('open');
      const av = document.getElementById('modalAvatar');
      av.innerHTML = p.avatar ? `<img src="${p.avatar}" onerror="this.parentNode.textContent='${username[0].toUpperCase()}'">` : username[0].toUpperCase();
      document.getElementById('modalName').innerHTML = username + (p.title ? `<span class="player-title">${p.title}</span>` : '');
      document.getElementById('modalMeta').textContent = `player_id: ${p.player_id || '—'}`;

      const games = allGames.filter(g => g.white?.username === username || g.black?.username === username);
      const wins = games.filter(g => (g.white?.username===username && g.white?.result==='win') || (g.black?.username===username && g.black?.result==='win')).length;
      const draws = games.filter(g => ['agreed','stalemate','repetition','timevsinsufficient','50move'].includes(g.white?.result)).length;
      const losses = games.length - wins - draws;

      document.getElementById('modalStats').innerHTML = `
        <div class="mini-stat"><div class="mini-stat-value">${games.length.toLocaleString('fr')}</div><div class="mini-stat-label">Parties</div></div>
        <div class="mini-stat"><div class="mini-stat-value result-win">${wins.toLocaleString('fr')}</div><div class="mini-stat-label">Victoires</div></div>
        <div class="mini-stat"><div class="mini-stat-value result-loss">${losses.toLocaleString('fr')}</div><div class="mini-stat-label">Défaites</div></div>
      `;

      if (games.length > 0) {
        const wPct = (wins/games.length*100).toFixed(1);
        const dPct = (draws/games.length*100).toFixed(1);
        const lPct = (losses/games.length*100).toFixed(1);
        document.getElementById('modalStats').innerHTML += `
          <div class="mini-stat" style="grid-column:1/-1">
            <div style="display:flex;justify-content:space-between;font-size:0.65rem;color:var(--muted);margin-bottom:6px">
              <span>Winrate: ${wPct}%</span><span>Nulles: ${dPct}%</span><span>Défaites: ${lPct}%</span>
            </div>
            <div class="result-bar">
              <div class="result-bar-win" style="width:${wPct}%"></div>
              <div class="result-bar-draw" style="width:${dPct}%"></div>
              <div class="result-bar-loss" style="width:${lPct}%"></div>
            </div>
          </div>`;
      }

      // Games list
      const mg = document.getElementById('modalGames');
      if (games.length === 0) {
        mg.innerHTML = '<div class="empty-state"><div class="icon">♔</div>Aucune partie dans le cache local</div>';
      } else {
        mg.innerHTML = `<table class="data-table">
          <thead><tr><th>Date</th><th>Adversaire</th><th>Couleur</th><th>Résultat</th><th>Type</th></tr></thead>
          <tbody>${games.slice(0,100).map(g => {
            const isWhite = g.white?.username === username;
            const opp = isWhite ? g.black?.username : g.white?.username;
            const res = isWhite ? g.white?.result : g.black?.result;
            const badge = res === 'win' ? '<span class="badge badge-win">Victoire</span>' :
                          ['agreed','stalemate','repetition','timevsinsufficient','50move'].includes(res) ? '<span class="badge badge-draw">Nulle</span>' :
                          '<span class="badge badge-loss">Défaite</span>';
            const date = g.end_time ? new Date(g.end_time*1000).toLocaleDateString('fr') : '—';
            return `<tr onclick="openGame('${g.url}')">
              <td style="color:var(--muted)">${date}</td>
              <td onclick="event.stopPropagation();openPlayer('${opp}')" style="color:var(--accent);cursor:pointer">${opp||'?'}</td>
              <td>${isWhite ? '♔ Blancs' : '♚ Noirs'}</td>
              <td>${badge}</td>
              <td style="text-transform:capitalize;color:var(--muted)">${g.time_class||'—'}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>`;
      }

      document.getElementById('modalInfo').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div><span style="color:var(--muted)">Username:</span> ${username}</div>
          <div><span style="color:var(--muted)">Titre:</span> ${p.title || '—'}</div>
          <div><span style="color:var(--muted)">ID:</span> ${p.player_id || '—'}</div>
          <div><span style="color:var(--muted)">API:</span> <a href="${p['@id']}" target="_blank" style="color:var(--accent)">${p['@id'] ? 'Voir ↗' : '—'}</a></div>
        </div>
        <div style="margin-top:16px"><a href="https://chess.com/member/${username}" target="_blank" class="btn btn-ghost" style="font-size:0.75rem">Voir sur Chess.com ↗</a></div>`;

      // Switch to first tab
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===0));
      document.querySelectorAll('.tab-content').forEach((t,i) => t.classList.toggle('active', i===0));
    }

    function openGame(url) {
      const game = allGames.find(g => g.url === url);
      if (!game) { window.open(url, '_blank'); return; }

      const w = game.white?.username || '?';
      const b = game.black?.username || '?';
      const wr = game.white?.result;
      const score = wr === 'win' ? '1-0' : ['agreed','stalemate','repetition'].includes(wr) ? '½-½' : '0-1';
      const date = game.end_time ? new Date(game.end_time*1000).toLocaleString('fr') : '—';

      document.getElementById('gameModalTitle').textContent = `${w} vs ${b} — ${score}`;
      document.getElementById('gameModalMeta').textContent = `${date} · ${game.time_class || ''} · ${game.rated ? 'Classé' : 'Amical'}`;

      let pgn = '';
      if (game.pgn) {
        const moves = game.pgn.replace(/\[.*?\]\s*/gs, '').trim();
        pgn = `<div style="margin-top:16px"><div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:8px">Notation PGN</div>
          <div class="pgn-box">${moves}</div></div>`;
      }

      document.getElementById('gameModalBody').innerHTML = `
        <div class="player-stats-grid" style="grid-template-columns:1fr auto 1fr;gap:12px;align-items:center">
          <div class="mini-stat">
            <div style="font-size:0.65rem;color:var(--muted);margin-bottom:4px">♔ Blancs</div>
            <div style="font-size:1rem;font-weight:700;color:var(--white);cursor:pointer" onclick="openPlayer('${w}')">${w}</div>
            <div style="font-size:0.65rem;color:var(--muted)">${game.white?.rating ? 'Elo ' + game.white.rating : ''}</div>
          </div>
          <div style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--gold);text-align:center">${score}</div>
          <div class="mini-stat" style="text-align:right">
            <div style="font-size:0.65rem;color:var(--muted);margin-bottom:4px">Noirs ♚</div>
            <div style="font-size:1rem;font-weight:700;color:var(--white);cursor:pointer" onclick="openPlayer('${b}')">${b}</div>
            <div style="font-size:0.65rem;color:var(--muted)">${game.black?.rating ? 'Elo ' + game.black.rating : ''}</div>
          </div>
        </div>
        <div style="margin-top:12px;font-size:0.75rem;color:var(--muted)">
          <span>Type: <b style="color:var(--white)">${game.time_class || '—'}</b></span>
          <span style="margin:0 12px">Cadence: <b style="color:var(--white)">${formatTimeControl(game.time_control)}</b></span>
          <span>${game.rated ? '<span class="badge badge-rated">Classé</span>' : '<span class="badge badge-casual">Amical</span>'}</span>
        </div>
        ${pgn}
        <div style="margin-top:16px"><a href="${url}" target="_blank" class="btn btn-ghost" style="font-size:0.75rem">Analyser sur Chess.com ↗</a></div>`;

      document.getElementById('gameModal').classList.add('open');
    }

    function closeModal(e) {
      if (e.target === e.currentTarget) {
        e.currentTarget.classList.remove('open');
      }
    }

    function switchTab(id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.currentTarget.classList.add('active');
    }

    // ===== Helpers =====
    function formatTimeControl(tc) {
      if (!tc) return '—';
      if (tc.includes('+')) {
        const [base, inc] = tc.split('+');
        return `${Math.floor(base/60)}min+${inc}s`;
      }
      if (!isNaN(tc)) return `${Math.floor(tc/60)}min`;
      return tc;
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // Keyboard shortcut
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
      }
    });
</script>
</body>
</html>
